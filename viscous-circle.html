<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>粘性の球 — X軸</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; touch-action:none; user-select:none; -webkit-user-select:none; }
body { background:#0c0c0c; height:100dvh; overflow:hidden; }
canvas { display:block; width:100%; height:100dvh; }
#hud { position:fixed; top:0; left:0; right:0; display:flex; justify-content:space-between;
       padding:20px 22px 0; pointer-events:none; z-index:5; }
.hl { font-size:9px; letter-spacing:4px; text-transform:uppercase; color:rgba(255,255,255,0.18);
      font-family:-apple-system,sans-serif; }
#over { position:fixed; inset:0; background:#0c0c0c; display:flex; flex-direction:column;
        align-items:center; justify-content:center; gap:28px; z-index:100; }
.ot { font-size:10px; letter-spacing:8px; color:rgba(255,255,255,0.45); text-transform:uppercase;
      font-family:-apple-system,sans-serif; }
.od { font-size:11px; color:rgba(255,255,255,0.25); text-align:center; line-height:2.6;
      font-family:-apple-system,sans-serif; }
.obs { font-family:-apple-system,sans-serif; font-size:10px; letter-spacing:5px; text-transform:uppercase;
       background:transparent; color:rgba(255,255,255,0.35);
       border:1px solid rgba(255,255,255,0.15); padding:14px 40px; cursor:pointer; }
</style>
</head>
<body>
<div id="hud">
  <span class="hl">← 傾ける</span>
  <span class="hl">傾ける →</span>
</div>
<canvas id="c"></canvas>
<div id="over">
  <div class="ot">粘性の球 — X軸</div>
  <div class="od">左右に傾けると粘性で球がゆっくり動きます<br>傾けすぎると止まり<br>90度で傾けた方向に飛び出します</div>
  <button class="obs" id="sb">Start</button>
</div>
<script>
'use strict';
const C=document.getElementById('c');
const X=C.getContext('2d');
function resize(){C.width=window.innerWidth; C.height=window.innerHeight;}
resize(); window.addEventListener('resize',resize);

let rawGamma=0, hasG=false, playing=false;

// Ball state
let bx=0, by=0, vx=0, vy=0;
let state='normal';   // 'normal' | 'falling' | 'idle'
let idleTimer=0;

const ballR   = ()=> Math.min(C.width,C.height) * 0.115; // larger
const maxDisp = ()=> C.width * 0.32;
const FALL_DEG = 80;

function initBall(){
  bx=C.width/2; by=C.height/2; vx=0; vy=0;
  state='normal'; idleTimer=0;
}

// ── Update ───────────────────────────────────────────────
function update(dt){
  const W=C.width, H=C.height, R=ballR();

  if(state==='idle'){
    idleTimer-=dt;
    if(idleTimer<=0) initBall();
    return;
  }

  if(state==='normal'){
    if(Math.abs(rawGamma)>=FALL_DEG){ state='falling'; return; }

    const posNorm=(bx-W/2)/maxDisp();
    const friction=Math.pow(Math.abs(posNorm),3.5);
    const driveF=(rawGamma/55)*1100*(1-friction*0.97);
    const dragF =-vx*5.8;
    vx+=(driveF+dragF)*dt;

    const nextX=bx+vx*dt;
    const disp=nextX-W/2;
    if(Math.abs(disp)<maxDisp()){ bx=nextX; }
    else { bx=W/2+Math.sign(disp)*maxDisp(); vx=0; }

    by+=(H/2-by)*6*dt;
  }

  if(state==='falling'){
    // Fall in the tilt direction (horizontal), not downward
    const dir=Math.sign(rawGamma);
    vx+=dir*3200*dt;   // strong horizontal thrust
    vy+=280*dt;         // very slight downward drift only
    bx+=vx*dt;
    by+=vy*dt;

    // Respawn when off-screen horizontally
    if(bx < -R*3 || bx > W+R*3 || by > H+R*3){
      state='idle'; idleTimer=0.75;
      bx=W/2; by=H/2; vx=0; vy=0;
    }
  }
}

// ── Draw ─────────────────────────────────────────────────
function draw(){
  const W=C.width, H=C.height, R=ballR();
  X.fillStyle='#0c0c0c'; X.fillRect(0,0,W,H);

  if(state==='idle') return;

  const posNorm   =(bx-W/2)/maxDisp();
  const stuckFactor=Math.max(0,Math.abs(posNorm)-0.80)/0.20;

  // Tension streaks near boundary
  if(stuckFactor>0.04 && state==='normal'){
    const sd=-Math.sign(bx-W/2);
    for(let i=0;i<5;i++){
      const dy=(i-2)*R*0.38;
      const sx=bx+Math.sign(bx-W/2)*R*0.94;
      const ex=sx+sd*R*(0.35+stuckFactor*0.85);
      X.beginPath(); X.moveTo(sx,by+dy); X.lineTo(ex,by+dy);
      X.strokeStyle=`rgba(160,210,230,${(stuckFactor*0.30).toFixed(3)})`;
      X.lineWidth=1; X.stroke();
    }
  }

  // Ground shadow (subtle)
  if(state==='normal'){
    X.save();
    X.translate(bx, by+R*0.88);
    X.scale(1.05,0.20);
    X.beginPath(); X.arc(0,0,R,0,Math.PI*2);
    X.fillStyle='rgba(100,180,210,0.10)'; X.fill();
    X.restore();
  }

  // ── Water-colored sphere ──────────────────────────────
  const sq=stuckFactor*0.10;
  const rX=R*(1-sq), rY=R*(1+sq*0.5);

  // Low-saturation light blue gradient (水色 with low saturation)
  const grd=X.createRadialGradient(
    bx-R*0.30, by-R*0.32, R*0.04,
    bx, by, R*1.05
  );
  grd.addColorStop(0,    '#e8f4f8');   // very light blue-white (highlight)
  grd.addColorStop(0.30, '#a8ccd8');   // light desaturated blue
  grd.addColorStop(0.65, '#5a90a8');   // medium blue-gray
  grd.addColorStop(1,    '#1c3848');   // dark blue shadow

  X.save();
  X.translate(bx,by); X.scale(rX/R,rY/R);
  X.beginPath(); X.arc(0,0,R,0,Math.PI*2);
  X.fillStyle=grd; X.fill();
  X.restore();

  // Inner rim (subtle edge glow for water feel)
  X.save();
  X.translate(bx,by); X.scale(rX/R,rY/R);
  X.beginPath(); X.arc(0,0,R,0,Math.PI*2);
  X.strokeStyle='rgba(180,230,245,0.25)'; X.lineWidth=2; X.stroke();
  X.restore();

  // Primary specular highlight
  X.beginPath();
  X.arc(bx-R*0.28, by-R*0.30, R*0.16, 0, Math.PI*2);
  X.fillStyle='rgba(255,255,255,0.78)'; X.fill();

  // Secondary small highlight
  X.beginPath();
  X.arc(bx-R*0.12, by-R*0.52, R*0.065, 0, Math.PI*2);
  X.fillStyle='rgba(255,255,255,0.45)'; X.fill();

  // Subtle horizontal guide
  X.strokeStyle='rgba(255,255,255,0.04)'; X.lineWidth=1;
  X.beginPath(); X.moveTo(0,H/2); X.lineTo(W,H/2); X.stroke();
}

// ── Loop ─────────────────────────────────────────────────
let lt=0;
function loop(ts){
  if(!playing) return;
  const dt=Math.min((ts-lt)/1000,0.05); lt=ts;
  update(dt); draw();
  requestAnimationFrame(loop);
}

window.addEventListener('deviceorientation',e=>{hasG=true; rawGamma=e.gamma||0;},true);

const K={};
window.addEventListener('keydown',e=>{K[e.key]=true;});
window.addEventListener('keyup',  e=>{K[e.key]=false;});
let kGamma=0;
setInterval(()=>{
  if(hasG) return;
  const s=2.5;
  if     (K['ArrowLeft'] ||K['a']) kGamma=Math.max(-90,kGamma-s);
  else if(K['ArrowRight']||K['d']) kGamma=Math.min( 90,kGamma+s);
  else kGamma*=0.85;
  rawGamma=kGamma;
},16);

document.getElementById('sb').addEventListener('click',async function(){
  if(typeof DeviceOrientationEvent!=='undefined'&&
     typeof DeviceOrientationEvent.requestPermission==='function'){
    try{const r=await DeviceOrientationEvent.requestPermission();
        if(r==='granted') window.addEventListener('deviceorientation',e=>{hasG=true;rawGamma=e.gamma||0;},true);
    }catch(e){}
  }
  document.getElementById('over').style.display='none';
  initBall();
  playing=true; lt=performance.now(); requestAnimationFrame(loop);
});
</script>
</body>
</html>
