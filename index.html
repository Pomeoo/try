<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>花 — Y軸</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; touch-action:none; user-select:none; -webkit-user-select:none; }
body { background:#0c0c0c; height:100dvh; overflow:hidden; }
canvas { display:block; width:100%; height:100dvh; }
#hud { position:fixed; top:0; left:0; right:0; display:flex; justify-content:space-between;
       padding:20px 22px 0; pointer-events:none; z-index:5; }
.hl { font-size:9px; letter-spacing:4px; text-transform:uppercase; color:rgba(255,255,255,0.18);
      font-family:-apple-system,sans-serif; }
#over { position:fixed; inset:0; background:#0c0c0c; display:flex; flex-direction:column;
        align-items:center; justify-content:center; gap:28px; z-index:100; }
.ot { font-size:10px; letter-spacing:8px; color:rgba(255,255,255,0.45); text-transform:uppercase;
      font-family:-apple-system,sans-serif; }
.od { font-size:11px; color:rgba(255,255,255,0.25); text-align:center; line-height:2.6;
      font-family:-apple-system,sans-serif; }
.obs { font-family:-apple-system,sans-serif; font-size:10px; letter-spacing:5px; text-transform:uppercase;
       background:transparent; color:rgba(255,255,255,0.35);
       border:1px solid rgba(255,255,255,0.15); padding:14px 40px; cursor:pointer; }
</style>
</head>
<body>
<div id="hud">
  <span class="hl">← 傾ける</span>
  <span class="hl">傾ける →</span>
</div>
<canvas id="c"></canvas>
<div id="over">
  <div class="ot">花 — Y軸</div>
  <div class="od">花は画面中央に固定されています<br>左右に傾けて通り過ぎると<br>なびいてゆっくり元に戻ります</div>
  <button class="obs" id="sb">Start</button>
</div>
<script>
'use strict';
const C = document.getElementById('c');
const X = C.getContext('2d');
function resize(){ C.width = window.innerWidth; C.height = window.innerHeight; }
resize(); window.addEventListener('resize', resize);

let rawGamma = 0, prevGamma = 0, dGamma = 0;
let hasG = false, playing = false, time = 0;

// Camera pan: flower fixed in world, screen pans with tilt
const PAN = () => C.width / 55;

// ── Bend spring ──────────────────────────────────────────
let bendAngle = 0, bendVel = 0;
let wasInContact = false;

// Bigger swing, more oscillation, like being brushed by wind
const CONTACT_DEG = 14;
const SPRING_K    = 3.2;   // lower = slower, more graceful swing
const SPRING_DAMP = 0.80;  // less damping = more oscillation
const IMPULSE_MAX = 5.5;   // larger impulse for dramatic sway
const MAX_BEND_PX = () => C.width * 0.22; // bigger visual lean

// ── Bezier helpers ────────────────────────────────────────
function bezP(P0,P1,P2,P3,t){
  const m=1-t;
  return {x:m*m*m*P0.x+3*m*m*t*P1.x+3*m*t*t*P2.x+t*t*t*P3.x,
          y:m*m*m*P0.y+3*m*m*t*P1.y+3*m*t*t*P2.y+t*t*t*P3.y};
}
function bezTan(P0,P1,P2,P3,t){
  const m=1-t;
  return {x:3*(m*m*(P1.x-P0.x)+2*m*t*(P2.x-P1.x)+t*t*(P3.x-P2.x)),
          y:3*(m*m*(P1.y-P0.y)+2*m*t*(P2.y-P1.y)+t*t*(P3.y-P2.y))};
}
function drawPetal(len, wid, color){
  X.beginPath();
  X.moveTo(0,0);
  X.bezierCurveTo(-wid,-len*0.22,-wid*0.60,-len*0.68,0,-len);
  X.bezierCurveTo( wid*0.60,-len*0.68,wid,-len*0.22,0,0);
  X.fillStyle=color; X.fill();
}
function drawLeaf(x,y,angle,size){
  X.save(); X.translate(x,y); X.rotate(angle);
  X.beginPath();
  X.moveTo(0,0);
  X.bezierCurveTo(size*0.30,-size*0.22,size*0.80,-size*0.18,size,0);
  X.bezierCurveTo(size*0.80,size*0.18,size*0.30,size*0.22,0,0);
  X.fillStyle='rgba(255,255,255,0.40)'; X.fill();
  X.beginPath(); X.moveTo(0,0); X.lineTo(size*0.88,0);
  X.strokeStyle='rgba(255,255,255,0.28)'; X.lineWidth=1; X.stroke();
  X.restore();
}

let lt=0;
function loop(ts){
  if(!playing) return;
  const dt=Math.min((ts-lt)/1000,0.05); lt=ts; time+=dt;

  dGamma=(rawGamma-prevGamma)/Math.max(dt,0.001);
  prevGamma=rawGamma;

  const inContact = Math.abs(rawGamma) < CONTACT_DEG;

  // Impulse when passing through the flower
  if(inContact && !wasInContact){
    // Scale impulse with crossing speed — fast swipe = big sway
    const speed = Math.min(Math.abs(dGamma), 100) / 100;
    const dir   = Math.sign(dGamma) || Math.sign(rawGamma) || 1;
    bendVel    += dir * (0.5 + speed * 0.5) * IMPULSE_MAX;
  }
  wasInContact = inContact;

  // Spring: restore + damping
  bendVel -= bendAngle * SPRING_K * dt;
  bendVel *= Math.pow(SPRING_DAMP, dt*60);
  bendAngle += bendVel * dt;

  draw();
  requestAnimationFrame(loop);
}

function draw(){
  const W=C.width, H=C.height;
  X.fillStyle='#0c0c0c'; X.fillRect(0,0,W,H);

  // Flower screen X via camera pan
  const fx = W/2 - rawGamma * PAN();

  const bendPx = Math.sin(bendAngle) * MAX_BEND_PX();
  const stemBot= H * 0.78;
  const stemLen= H * 0.30;
  const R      = Math.min(W,H) * 0.115;

  const P0={x:fx,              y:stemBot};
  const P1={x:fx+bendPx*0.30,  y:stemBot-stemLen*0.38};
  const P2={x:fx+bendPx*0.78,  y:stemBot-stemLen*0.68};
  const P3={x:fx+bendPx,       y:stemBot-stemLen};

  const tan3    = bezTan(P0,P1,P2,P3,1.0);
  const tipAngle= Math.atan2(tan3.y,tan3.x)+Math.PI/2;

  // Flutter: visibly stronger when swaying hard
  const swayAmt = Math.min(Math.abs(bendAngle), 1.2);
  const flutter = Math.sin(time*2.6)*0.04*swayAmt;

  // Leaves (lean more dramatically with bend)
  const lp1=bezP(P0,P1,P2,P3,0.40), lt1=bezTan(P0,P1,P2,P3,0.40);
  drawLeaf(lp1.x,lp1.y, Math.atan2(lt1.y,lt1.x)+Math.PI/2+0.42+bendAngle*0.35, R*0.60);

  const lp2=bezP(P0,P1,P2,P3,0.58), lt2=bezTan(P0,P1,P2,P3,0.58);
  drawLeaf(lp2.x,lp2.y, Math.atan2(lt2.y,lt2.x)-Math.PI/2-0.42+bendAngle*0.35, R*0.52);

  // Stem
  X.beginPath();
  X.moveTo(P0.x,P0.y); X.bezierCurveTo(P1.x,P1.y,P2.x,P2.y,P3.x,P3.y);
  X.strokeStyle='rgba(255,255,255,0.70)'; X.lineWidth=2.5; X.stroke();

  // Flower head
  X.save();
  X.translate(P3.x,P3.y); X.rotate(tipAngle+flutter);

  const nP=5, pLen=R*0.94, pWid=R*0.39;

  // Per-petal sway: petals on the leading side lean more
  for(let i=0;i<nP;i++){
    const a=(i/nP)*Math.PI*2;
    // Sway effect: petals in the bend direction lean more
    const sway=Math.cos(a)*bendAngle*0.18;
    const pfl =Math.sin(time*3.0+i*1.1)*0.06*swayAmt;
    X.save(); X.rotate(a+pfl+sway); X.translate(0,3);
    drawPetal(pLen,pWid,'rgba(0,0,0,0.18)');
    X.restore();
  }
  for(let i=0;i<nP;i++){
    const a=(i/nP)*Math.PI*2;
    const sway=Math.cos(a)*bendAngle*0.18;
    const pfl =Math.sin(time*3.0+i*1.1)*0.06*swayAmt;
    // Petals on windward side brighten slightly
    const bright=0.60+Math.cos(a-Math.sign(bendAngle||1)*Math.PI/2)*0.12*Math.min(Math.abs(bendAngle),1);
    X.save(); X.rotate(a+pfl+sway);
    drawPetal(pLen,pWid,`rgba(255,255,255,${bright.toFixed(2)})`);
    X.restore();
  }

  // Center disc
  const cg=X.createRadialGradient(-R*0.07,-R*0.07,0,0,0,R*0.27);
  cg.addColorStop(0,'#e0e0e0'); cg.addColorStop(1,'#848484');
  X.beginPath(); X.arc(0,0,R*0.27,0,Math.PI*2); X.fillStyle=cg; X.fill();

  X.restore();
}

window.addEventListener('deviceorientation',e=>{hasG=true; rawGamma=e.gamma||0;},true);

const K={};
window.addEventListener('keydown',e=>{K[e.key]=true;});
window.addEventListener('keyup',  e=>{K[e.key]=false;});
let kGamma=0;
setInterval(()=>{
  if(hasG) return;
  const s=2.5;
  if     (K['ArrowLeft'] ||K['a']) kGamma=Math.max(-90,kGamma-s);
  else if(K['ArrowRight']||K['d']) kGamma=Math.min( 90,kGamma+s);
  else kGamma*=0.84;
  rawGamma=kGamma;
},16);

document.getElementById('sb').addEventListener('click',async function(){
  if(typeof DeviceOrientationEvent!=='undefined'&&
     typeof DeviceOrientationEvent.requestPermission==='function'){
    try{const r=await DeviceOrientationEvent.requestPermission();
        if(r==='granted') window.addEventListener('deviceorientation',e=>{hasG=true;rawGamma=e.gamma||0;},true);
    }catch(e){}
  }
  document.getElementById('over').style.display='none';
  bendAngle=0; bendVel=0; wasInContact=false; prevGamma=rawGamma; time=0;
  playing=true; lt=performance.now(); requestAnimationFrame(loop);
});
</script>
</body>
</html>
