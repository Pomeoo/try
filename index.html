<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>仮想杖</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body {
  width:100%; height:100%; overflow:hidden;
  background:#fff;
  touch-action:none;
  -webkit-user-select:none; user-select:none;
}
canvas { display:block; }

/* センサー動作確認インジケーター */
#indicator {
  position:fixed; top:20px; left:50%;
  transform:translateX(-50%);
  display:flex; align-items:center; gap:7px;
  font-family:-apple-system, sans-serif;
  font-size:11px; letter-spacing:0.08em;
  color:rgba(0,0,0,0.25);
  pointer-events:none;
}
#dot {
  width:7px; height:7px; border-radius:50%;
  background:rgba(0,0,0,0.1);
}

#startBtn {
  position:fixed; bottom:54px; left:50%;
  transform:translateX(-50%);
  padding:15px 54px;
  border:1px solid rgba(0,0,0,0.13);
  border-radius:100px;
  background:transparent;
  color:rgba(0,0,0,0.45);
  font-family:-apple-system, sans-serif;
  font-size:15px; letter-spacing:0.06em;
  cursor:pointer;
}
#startBtn:active { opacity:0.4; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="indicator"><span id="dot"></span><span id="itext">待機中</span></div>
<button id="startBtn" onclick="startSensor()">計測開始</button>

<script>
// ── Canvas ───────────────────────────────────────
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
let W, H;

function resize() {
  const dpr = window.devicePixelRatio || 1;
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width  = W * dpr;
  canvas.height = H * dpr;
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
resize();
window.addEventListener('resize', resize);

// ── センサー物理 ─────────────────────────────────
let posX    = 0;       // 右方向移動距離 (m)
let velX    = 0;
let lastT   = null;
let running = false;

const STILL = 0.09;    // 静止閾値 m/s²
const DAMP  = 0.78;    // 静止時速度ダンピング

// ── 仮想オブジェクトの位置 ───────────────────────
const OBJ_X = 0.030;   // 3cm : 物体に当たる位置

// ── 杖アニメーション ──────────────────────────────
//
// 設計思想:
//   移動距離 posX → 杖の傾き角度 sweepAngle に直接マッピング
//   支点は常に画面中央(W/2, H/2)で固定
//   物体ヒット時: 一度だけ反発オフセット(impactOffset)を加算
//
const SWEEP_SCALE = 5.5;   // rad/m （移動量→角度の係数）
//   例: 3cm移動 → 0.03 × 5.5 = 0.165 rad ≈ 9.4°

let hitFired  = false;
let hitTime   = 0;         // ヒット発生時刻 (performance.now)

// 移動距離→基準角度
function sweepAngle() {
  return posX * SWEEP_SCALE;
}

// ヒット後の反発オフセット（減衰振動、一度きり）
function impactOffset(now) {
  if (!hitFired) return 0;
  const t = (now - hitTime) * 0.001; // 秒
  // -0.22rad(反発)から始まり減衰振動して0に収束
  // exp(-t*7)*cos(t*20) : 約0.9秒で収束
  return -0.22 * Math.exp(-t * 7.0) * Math.cos(t * 20.0);
}

// ── 描画 ─────────────────────────────────────────
function drawCane(angle) {
  const cx = W / 2;
  const cy = H / 2;
  // 支点(cx,cy)を中心に、画面対角線より長い線を引く
  const len = Math.hypot(W, H) * 0.6 + 10;
  const sa  = Math.sin(angle);
  const ca  = Math.cos(angle);

  // 杖の線（2px グレー）
  ctx.save();
  ctx.strokeStyle = '#b2b2b2';
  ctx.lineWidth   = 2;
  ctx.lineCap     = 'butt';
  ctx.beginPath();
  ctx.moveTo(cx - sa * len, cy - ca * len); // 上方向端
  ctx.lineTo(cx + sa * len, cy + ca * len); // 下方向端
  ctx.stroke();
  ctx.restore();
}

function draw(now) {
  requestAnimationFrame(draw);

  // 白背景
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, 0, W, H);

  // 現在の杖角度 = 移動量由来の基準角 + ヒット反発オフセット
  const angle = sweepAngle() + impactOffset(now);

  drawCane(angle);
}
requestAnimationFrame(draw);

// ── センサー処理 ──────────────────────────────────
function handleMotion(e) {
  if (!running) return;

  const now = performance.now();
  if (!lastT) { lastT = now; return; }
  const dt = Math.min((now - lastT) * 0.001, 0.05);
  lastT = now;

  const acc = e.accelerationIncludingGravity || e.acceleration;
  if (!acc) return;

  // iPhone portrait: X軸 = 左右（右が正）
  const raw      = acc.x || 0;
  const filtered = raw > STILL ? raw : 0;

  velX = (velX + filtered * dt) * (filtered === 0 ? DAMP : 0.99);
  if (velX < 0.002) velX = 0;

  // 右方向のみ加算
  posX += Math.max(0, velX * dt);

  // ── ヒット判定（一度きり） ──
  if (!hitFired && posX >= OBJ_X) {
    hitFired = true;
    hitTime  = performance.now();
  }

  updateIndicator();
}

// ── 動作確認インジケーター ────────────────────────
function updateIndicator() {
  const dot = document.getElementById('dot');
  const txt = document.getElementById('itext');

  if (hitFired) {
    // ヒット後は収束しているかどうかで表示切替
    const elapsed = (performance.now() - hitTime) * 0.001;
    if (elapsed < 1.2) {
      dot.style.background = 'rgba(60,120,220,0.9)';
      txt.textContent      = 'ヒット';
    } else {
      dot.style.background = 'rgba(40,185,100,0.85)';
      txt.textContent      = 'センサー動作中';
    }
  } else {
    dot.style.background = 'rgba(40,185,100,0.85)';
    txt.textContent      = 'センサー動作中';
  }
}

// ── 開始 ─────────────────────────────────────────
async function startSensor() {
  const btn = document.getElementById('startBtn');

  if (typeof DeviceMotionEvent !== 'undefined'
      && typeof DeviceMotionEvent.requestPermission === 'function') {
    try {
      const p = await DeviceMotionEvent.requestPermission();
      if (p !== 'granted') {
        document.getElementById('itext').textContent = 'センサー許可が必要です';
        return;
      }
    } catch(err) {
      document.getElementById('itext').textContent = '起動エラー';
      return;
    }
  }

  window.addEventListener('devicemotion', handleMotion, { passive: true });
  running = true;

  btn.textContent = 'リセット';
  btn.onclick     = doReset;

  document.getElementById('dot').style.background = 'rgba(40,185,100,0.85)';
  document.getElementById('itext').textContent    = 'センサー動作中';
}

// ── リセット ─────────────────────────────────────
function doReset() {
  posX     = 0;
  velX     = 0;
  hitFired = false;
  lastT    = null;

  document.getElementById('dot').style.background = 'rgba(40,185,100,0.85)';
  document.getElementById('itext').textContent    = 'センサー動作中';
}
</script>
</body>
</html>
