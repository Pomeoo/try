<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>仮想杖</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body {
  width:100%; height:100%; overflow:hidden;
  background:#fff;
  touch-action:none;
  -webkit-user-select:none; user-select:none;
}
canvas { display:block; }

#indicator {
  position:fixed; top:20px; right:20px;
  display:flex; align-items:center; gap:7px;
  font-family:-apple-system, sans-serif;
  font-size:11px; letter-spacing:0.08em;
  color:rgba(0,0,0,0.25);
  pointer-events:none;
}
#dot {
  width:7px; height:7px; border-radius:50%;
  background:rgba(0,0,0,0.1);
  transition:background 0.2s;
}
#itxt { transition:color 0.2s; }

#startBtn {
  position:fixed; bottom:54px; left:50%;
  transform:translateX(-50%);
  padding:15px 56px; border-radius:100px;
  border:1px solid rgba(0,0,0,0.13);
  background:transparent;
  color:rgba(0,0,0,0.45);
  font-family:-apple-system, sans-serif;
  font-size:15px; letter-spacing:0.06em;
  cursor:pointer;
}
#startBtn:active { opacity:0.4; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="indicator"><span id="dot"></span><span id="itxt">待機中</span></div>
<button id="startBtn" onclick="startSensor()">計測開始</button>

<script>
// ── Canvas ──────────────────────────────────────────
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
let W, H;

function resize() {
  const dpr = window.devicePixelRatio || 1;
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width  = W * dpr;
  canvas.height = H * dpr;
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
resize();
window.addEventListener('resize', resize);

// ── 仮想世界 ─────────────────────────────────────────
//
// SCALE: 仮想世界(m) → スクリーン(px) の変換係数
// 3200px/m = 32px/cm
//
const SCALE = 3200;

// 3つのオブジェクト（横並び、2cm〜6cmの範囲に配置）
// cx = 中心のワールド座標(m), hw = 半幅(m)
const OBJS = [
  { cx: 0.025, hw: 0.005, hit: false },  // 2.0〜3.0cm
  { cx: 0.040, hw: 0.005, hit: false },  // 3.5〜4.5cm
  { cx: 0.055, hw: 0.005, hit: false },  // 5.0〜6.0cm
];

// 1cmを表す表示サイズ
const OBJ_SIDE = Math.round(SCALE * 0.010); // 32px

// ── 杖のバネ物理 ─────────────────────────────────────
//
// 杖は常に画面中央(W/2, H/2)を支点として表示される。
// sAngle: バネによる傾き角(rad)。衝突時にキックされ、減衰振動して0に戻る。
// 正 = 先端が右へ、負 = 先端が左へ。
//
let sAngle = 0;
let sVel   = 0;

// ── センサー ─────────────────────────────────────────
let posX    = 0;       // デバイスの右方向移動量(m)
let velX    = 0;
let lastST  = null;
let running = false;
const STILL = 0.09;   // 静止判定閾値 m/s²
const DAMP  = 0.80;   // 静止時速度ダンピング

// ── 描画ループ ────────────────────────────────────────
let lastDrawT = 0;
let lastHitT  = -Infinity;

function draw(now) {
  requestAnimationFrame(draw);

  // バネ積分（フレーム差分で更新）
  const dt = Math.min((now - (lastDrawT || now)) * 0.001, 0.05);
  lastDrawT = now;
  const F = -140 * sAngle - 13 * sVel;
  sVel    += F * dt;
  sAngle  += sVel * dt;
  if (Math.abs(sAngle) < 0.0008 && Math.abs(sVel) < 0.0008) {
    sAngle = 0; sVel = 0;
  }

  // 背景
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, 0, W, H);

  const cx = W / 2;
  const cy = H / 2;

  // ── オブジェクト描画 ───────────────────────────────
  // スクリーンX = 画面中央 + (オブジェクトのワールドX - 現在の移動距離) × SCALE
  // → posXが増えるほどオブジェクトは左へ流れる
  const objY = H * 0.72; // オブジェクトのY位置（画面下部）

  for (const obj of OBJS) {
    const sx = cx + (obj.cx - posX) * SCALE;
    // 画面外は描かない
    if (sx + OBJ_SIDE < 0 || sx - OBJ_SIDE > W) continue;

    const left = sx - OBJ_SIDE / 2;
    const top  = objY - OBJ_SIDE / 2;

    ctx.save();
    // ヒット済みは少し薄く（通過後）
    ctx.fillStyle   = obj.hit
      ? 'rgba(170,170,170,0.30)'
      : 'rgba(170,170,170,0.85)';
    ctx.strokeStyle = obj.hit
      ? 'rgba(120,120,120,0.25)'
      : 'rgba(110,110,110,0.75)';
    ctx.lineWidth = 1;
    ctx.fillRect(left, top, OBJ_SIDE, OBJ_SIDE);
    ctx.strokeRect(left, top, OBJ_SIDE, OBJ_SIDE);
    ctx.restore();
  }

  // ── 杖描画 ────────────────────────────────────────
  // 支点(cx, cy)を中心に sAngle だけ傾いた全画面長の直線
  const halfLen = Math.hypot(W, H) * 0.55;
  const sa = Math.sin(sAngle);
  const ca = Math.cos(sAngle);

  // 上端（持ち手側）
  const x1 = cx - sa * halfLen;
  const y1 = cy - ca * halfLen;
  // 下端（先端側）
  const x2 = cx + sa * halfLen;
  const y2 = cy + ca * halfLen;

  ctx.save();
  ctx.strokeStyle = '#b0b0b0';
  ctx.lineWidth   = 2;
  ctx.lineCap     = 'butt';
  ctx.beginPath();
  ctx.moveTo(x1, y1);
  ctx.lineTo(x2, y2);
  ctx.stroke();
  ctx.restore();

  // ── ステータス更新 ────────────────────────────────
  if (running) {
    const dot = document.getElementById('dot');
    const txt = document.getElementById('itxt');
    const hitRecent = (now - lastHitT) < 1200;

    if (hitRecent) {
      dot.style.background = 'rgba(60,120,220,0.9)';
      txt.style.color      = 'rgba(60,120,220,0.85)';
      txt.textContent      = 'ヒット';
    } else {
      dot.style.background = 'rgba(40,185,100,0.85)';
      txt.style.color      = 'rgba(0,0,0,0.25)';
      txt.textContent      = 'センサー動作中';
    }
  }
}
requestAnimationFrame(draw);

// ── センサー処理 ──────────────────────────────────────
function handleMotion(e) {
  if (!running) return;

  const now = performance.now();
  if (!lastST) { lastST = now; return; }
  const dt = Math.min((now - lastST) * 0.001, 0.05);
  lastST = now;

  const acc = e.accelerationIncludingGravity || e.acceleration;
  if (!acc) return;

  // iPhone portrait: X軸 = 左右（右が正）
  const raw      = acc.x || 0;
  const filtered = raw > STILL ? raw : 0;

  velX = (velX + filtered * dt) * (filtered === 0 ? DAMP : 0.99);
  if (velX < 0.002) velX = 0;
  posX += Math.max(0, velX * dt);  // 右方向のみ

  // ── 衝突判定（オブジェクトごとに一度きり） ────────────
  for (const obj of OBJS) {
    if (!obj.hit && posX >= obj.cx - obj.hw) {
      obj.hit  = true;
      lastHitT = performance.now();
      // 先端を左へ弾く（オブジェクトが右から押し返す力）
      sVel -= 3.0;
    }
  }
}

// ── 開始 ─────────────────────────────────────────────
async function startSensor() {
  const btn = document.getElementById('startBtn');

  if (typeof DeviceMotionEvent !== 'undefined'
      && typeof DeviceMotionEvent.requestPermission === 'function') {
    try {
      const p = await DeviceMotionEvent.requestPermission();
      if (p !== 'granted') {
        document.getElementById('itxt').textContent = 'センサー許可が必要です';
        return;
      }
    } catch(err) {
      document.getElementById('itxt').textContent = '起動エラー';
      return;
    }
  }

  window.addEventListener('devicemotion', handleMotion, { passive: true });
  running  = true;
  lastST   = null;

  btn.textContent = 'リセット';
  btn.onclick     = doReset;

  document.getElementById('dot').style.background = 'rgba(40,185,100,0.85)';
  document.getElementById('itxt').textContent      = 'センサー動作中';
}

// ── リセット ──────────────────────────────────────────
function doReset() {
  posX   = 0;
  velX   = 0;
  lastST = null;
  sAngle = 0;
  sVel   = 0;
  lastHitT = -Infinity;
  OBJS.forEach(o => o.hit = false);
  document.getElementById('dot').style.background = 'rgba(40,185,100,0.85)';
  document.getElementById('itxt').style.color     = 'rgba(0,0,0,0.25)';
  document.getElementById('itxt').textContent      = 'センサー動作中';
}
</script>
</body>
</html>
