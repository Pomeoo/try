<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Virtual Cane | バーチャル杖</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; touch-action: none; -webkit-tap-highlight-color: transparent; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #06090e; }
canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: block; }

#overlay {
  position: fixed; inset: 0; z-index: 100;
  display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px;
  background: rgba(6, 9, 14, 0.97);
  font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
}
#overlay h1 {
  color: rgba(255,255,255,0.9); font-size: 24px; font-weight: 400; letter-spacing: 2px;
  text-transform: uppercase;
}
#overlay .subtitle { color: rgba(255,255,255,0.35); font-size: 12px; letter-spacing: 1px; }
#overlay .desc {
  color: rgba(255,255,255,0.5); font-size: 13px; text-align: center;
  max-width: 300px; line-height: 1.8; margin: 8px 0 16px;
}
#start-btn {
  padding: 13px 40px;
  background: transparent;
  border: 1px solid rgba(255,255,255,0.25);
  border-radius: 40px;
  color: rgba(255,255,255,0.8);
  font-size: 14px; letter-spacing: 1px;
  cursor: pointer; text-transform: uppercase;
  transition: border-color 0.2s, background 0.2s;
}
#start-btn:hover { border-color: rgba(255,255,255,0.5); background: rgba(255,255,255,0.05); }
#start-btn:active { background: rgba(255,255,255,0.1); }
.key-hint { color: rgba(255,255,255,0.2); font-size: 11px; letter-spacing: 0.5px; }

#hud {
  position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%);
  display: flex; gap: 20px; align-items: center;
  font-family: 'SF Mono', 'Courier New', monospace;
  font-size: 10px; color: rgba(255,255,255,0.2);
  pointer-events: none; z-index: 10; letter-spacing: 0.5px;
  white-space: nowrap;
}
#hud .sep { color: rgba(255,255,255,0.1); }

#toast {
  position: fixed; top: 38%; left: 50%; transform: translate(-50%, -50%);
  background: rgba(6,9,14,0.9);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 10px; padding: 10px 22px;
  font-family: -apple-system, sans-serif;
  font-size: 14px; font-weight: 500; letter-spacing: 0.5px;
  color: white; opacity: 0;
  transition: opacity 0.25s;
  pointer-events: none; z-index: 50; white-space: nowrap;
}
</style>
</head>
<body>

<canvas id="c"></canvas>

<div id="overlay">
  <div class="subtitle">prototype</div>
  <h1>Virtual Cane</h1>
  <p class="desc">
    デバイスを水平に動かして<br>
    見えない物体を探索してください<br>
    杖先が物体にぶつかると<br>
    質感に応じて反応します
  </p>
  <button id="start-btn">開始する</button>
  <div class="key-hint">PCでは ← → キーで操作可能</div>
</div>

<div id="hud">
  <span id="hud-pos">0.0 cm</span>
  <span class="sep">|</span>
  <span id="hud-mat">—</span>
</div>

<div id="toast"></div>

<script>
// ══════════════════════════════════════════════
//  CANVAS SETUP
// ══════════════════════════════════════════════
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H;
function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
resize();
window.addEventListener('resize', resize);

// ══════════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════════
let started = false;
let vx = 0;           // virtual x position (cm)
let vel = 0;          // velocity (cm/s)
let lastT = null;

let tipOff = 0;       // cane tip x offset (px)  
let tipVel = 0;       // tip velocity
let inContact = false;
let contactMat = null;

// ══════════════════════════════════════════════
//  OBJECTS & MATERIALS
// ══════════════════════════════════════════════
const CONTACT_WIDTH = 7; // cm — contact zone depth per object

const objects = [
  { pos: 20,  mat: 'wood'   },
  { pos: 42,  mat: 'fabric' },
  { pos: 63,  mat: 'glass'  },
  { pos: 84,  mat: 'metal'  },
  { pos: 105, mat: 'rubber' },
];

/*
  k  = spring stiffness (higher = harder/stiffer surface)
  c  = damping coefficient (higher = settles faster, less oscillation)
  maxD = max tip deflection in pixels
  vib  = vibration pattern (Vibration API)
*/
const MATS = {
  wood:   { jp: '木材', en: 'Wood',   col: '#c87c3a', k: 680,  c: 16,  maxD: 30, vib: [30, 10, 20]                },
  fabric: { jp: '布',   en: 'Fabric', col: '#9b6ec8', k: 110,  c: 58,  maxD: 58, vib: [6, 6, 6, 6, 6, 6]         },
  glass:  { jp: 'ガラス',en: 'Glass', col: '#63b8e8', k: 1500, c: 3.5, maxD: 10, vib: [12, 4, 10, 4, 12, 4, 8]   },
  metal:  { jp: '金属', en: 'Metal',  col: '#a8bfc9', k: 2400, c: 2.0, maxD: 7,  vib: [60, 12, 40, 12, 50]       },
  rubber: { jp: 'ゴム', en: 'Rubber', col: '#e04848', k: 360,  c: 10,  maxD: 75, vib: [18, 8, 36, 8, 24]         },
};

// ══════════════════════════════════════════════
//  TOAST
// ══════════════════════════════════════════════
const toastEl = document.getElementById('toast');
let toastTid;
function showToast(mat) {
  const m = MATS[mat];
  toastEl.textContent = m.jp + '  ' + m.en;
  toastEl.style.color = m.col;
  toastEl.style.borderColor = m.col + '55';
  toastEl.style.opacity = '1';
  clearTimeout(toastTid);
  toastTid = setTimeout(() => { toastEl.style.opacity = '0'; }, 1800);
}

// ══════════════════════════════════════════════
//  START
// ══════════════════════════════════════════════
document.getElementById('start-btn').addEventListener('click', async () => {
  if (typeof DeviceMotionEvent !== 'undefined' &&
      typeof DeviceMotionEvent.requestPermission === 'function') {
    try {
      const p = await DeviceMotionEvent.requestPermission();
      if (p !== 'granted') { alert('モーションセンサーの許可が必要です'); return; }
    } catch (e) { /* fall through to keyboard mode */ }
  }
  started = true;
  document.getElementById('overlay').style.display = 'none';
  window.addEventListener('devicemotion', onMotion, { passive: true });
});

// ══════════════════════════════════════════════
//  DEVICE MOTION
// ══════════════════════════════════════════════
function onMotion(e) {
  const ag = e.accelerationIncludingGravity;
  if (!ag) return;
  const now = performance.now();
  if (lastT === null) { lastT = now; return; }
  const dt = Math.min((now - lastT) / 1000, 0.05);
  lastT = now;

  // x-axis = left / right when device held portrait
  const ax = ag.x || 0;
  vel += ax * dt * 55;
  vel *= Math.pow(0.90, dt * 60);  // friction
  vx = Math.max(0, vx + vel * dt);
}

// ══════════════════════════════════════════════
//  KEYBOARD FALLBACK (desktop)
// ══════════════════════════════════════════════
const keys = {};
window.addEventListener('keydown', e => {
  if (e.key === 'ArrowLeft' || e.key === 'ArrowRight') {
    e.preventDefault(); keys[e.key] = true;
    if (!started) {
      started = true;
      document.getElementById('overlay').style.display = 'none';
    }
  }
});
window.addEventListener('keyup', e => { keys[e.key] = false; });

function applyKeyboard(dt) {
  if (!started) return;
  const spd = 22;
  if (keys['ArrowRight']) vel = Math.min(vel + spd * dt * 60 * 0.12, 60);
  else if (keys['ArrowLeft']) vel = Math.max(vel - spd * dt * 60 * 0.12, -60);
  else vel *= Math.pow(0.82, dt * 60);
  vx = Math.max(0, vx + vel * dt);
}

// ══════════════════════════════════════════════
//  PHYSICS
// ══════════════════════════════════════════════
function physicsStep(dt) {
  // ── Collision detection ──
  let hit = null;
  for (const obj of objects) {
    const d = vx - obj.pos;
    if (d >= 0 && d < CONTACT_WIDTH) { hit = { obj, d }; break; }
  }

  if (hit && !inContact) {
    // First contact
    inContact = true;
    contactMat = hit.obj.mat;
    // Initial impulse: speed-based, capped per material
    const m = MATS[contactMat];
    const impactVel = Math.min(Math.abs(vel), 40) + 5;
    tipVel = -impactVel * (m.maxD / 35);
    if (navigator.vibrate) navigator.vibrate(m.vib);
    showToast(contactMat);
    document.getElementById('hud-mat').textContent = m.jp;
  } else if (!hit && inContact) {
    inContact = false;
    contactMat = null;
    document.getElementById('hud-mat').textContent = '—';
  }

  if (inContact) {
    const m = MATS[contactMat];
    const depth = hit.d / CONTACT_WIDTH;          // 0..1
    const target = -(depth * m.maxD);             // pushed backward
    const spring  = (target - tipOff) * m.k * 0.001;
    const damping = -tipVel * m.c * 0.1;
    tipVel += (spring + damping) * dt * 60;
  } else {
    // Return to centre with spring
    const spring  = -tipOff * 420 * 0.001;
    const damping = -tipVel * 22 * 0.1;
    tipVel += (spring + damping) * dt * 60;
  }

  tipOff += tipVel * dt * 60 * 0.28;
  tipOff = Math.max(-130, Math.min(130, tipOff));
}

// ══════════════════════════════════════════════
//  DRAW HELPERS
// ══════════════════════════════════════════════
function drawBackground() {
  ctx.fillStyle = '#06090e';
  ctx.fillRect(0, 0, W, H);
}

function drawObjectHints() {
  const MAX_RANGE = 130;
  for (const obj of objects) {
    const rel = obj.pos - vx;       // positive = ahead
    if (rel < -5 || rel > 40) continue;
    const m = MATS[obj.mat];
    const alpha = Math.max(0, 1 - rel / 40) * 0.1;
    const sx = W / 2 + rel * 7;    // rough screen projection

    // Vertical glow band
    const g = ctx.createLinearGradient(sx - 22, 0, sx + 22, 0);
    g.addColorStop(0, 'transparent');
    g.addColorStop(0.5, m.col + Math.round(alpha * 255).toString(16).padStart(2,'0'));
    g.addColorStop(1, 'transparent');
    ctx.fillStyle = g;
    ctx.fillRect(sx - 22, 0, 44, H);

    // Text hint when close (5–35 cm away)
    if (rel > 0 && rel < 28) {
      const ta = Math.min(1, (1 - rel / 28)) * 0.55;
      ctx.save();
      ctx.globalAlpha = ta;
      ctx.fillStyle = m.col;
      ctx.font = '500 13px -apple-system, sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText(m.jp + '  ' + m.en, sx, H * 0.45);
      ctx.font = '400 11px -apple-system, sans-serif';
      ctx.fillStyle = 'rgba(255,255,255,0.4)';
      ctx.fillText(Math.round(rel) + ' cm 先', sx, H * 0.45 + 18);
      ctx.restore();
    }
  }
}

function drawRadar() {
  const rx = 20, ry = 16, rw = W - 40, rh = 3;
  const MAX = 130;

  ctx.fillStyle = 'rgba(255,255,255,0.06)';
  ctx.beginPath();
  if (ctx.roundRect) ctx.roundRect(rx, ry, rw, rh, 2);
  else ctx.rect(rx, ry, rw, rh);
  ctx.fill();

  for (const obj of objects) {
    const sx = rx + (obj.pos / MAX) * rw;
    const m = MATS[obj.mat];
    const active = contactMat === obj.mat;
    ctx.fillStyle = active ? m.col : m.col + '70';
    ctx.beginPath();
    ctx.arc(sx, ry + rh / 2, active ? 4 : 2.5, 0, Math.PI * 2);
    ctx.fill();
    if (active) {
      ctx.save();
      ctx.globalAlpha = 0.3;
      ctx.fillStyle = m.col;
      ctx.beginPath();
      ctx.arc(sx, ry + rh / 2, 8, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }
  }

  const px = rx + Math.min(vx / MAX, 1) * rw;
  ctx.fillStyle = 'rgba(255,255,255,0.7)';
  ctx.beginPath();
  ctx.arc(px, ry + rh / 2, 2.5, 0, Math.PI * 2);
  ctx.fill();
}

function drawCane(t) {
  const cx  = W / 2;
  const hY  = H - 55;   // handle y (bottom)
  const tY  = 30;        // tip y (top)
  const tX  = cx + tipOff;

  // Bezier control points — shaft bends between handle and tip
  const cp1x = cx + tipOff * 0.08;
  const cp1y = hY - (hY - tY) * 0.32;
  const cp2x = cx + tipOff * 0.55;
  const cp2y = hY - (hY - tY) * 0.72;

  // ── Glow when in contact ──
  if (inContact && contactMat) {
    const m = MATS[contactMat];
    const intensity = Math.min(Math.abs(tipOff) / m.maxD, 1);
    ctx.save();
    ctx.globalAlpha = 0.18 * intensity;
    ctx.strokeStyle = m.col;
    ctx.lineWidth = 18;
    ctx.lineCap = 'round';
    ctx.filter = 'blur(5px)';
    ctx.beginPath();
    ctx.moveTo(cx, hY);
    ctx.bezierCurveTo(cp1x, cp1y, cp2x, cp2y, tX, tY);
    ctx.stroke();
    ctx.restore();
  }

  // ── Shaft (2 px) ──
  ctx.save();
  ctx.lineWidth = 2;
  ctx.lineCap = 'round';
  const grad = ctx.createLinearGradient(cx, hY, tX, tY);
  if (inContact && contactMat) {
    const m = MATS[contactMat];
    grad.addColorStop(0,   '#d4a055');
    grad.addColorStop(0.75,'rgba(255,255,255,0.88)');
    grad.addColorStop(1,    m.col);
  } else {
    grad.addColorStop(0,   '#c8995a');
    grad.addColorStop(0.8, 'rgba(255,255,255,0.82)');
    grad.addColorStop(1,   'rgba(255,255,255,0.45)');
  }
  ctx.strokeStyle = grad;
  ctx.beginPath();
  ctx.moveTo(cx, hY);
  ctx.bezierCurveTo(cp1x, cp1y, cp2x, cp2y, tX, tY);
  ctx.stroke();
  ctx.restore();

  // ── Handle (bottom) ──
  ctx.save();
  ctx.fillStyle = '#c8995a';
  ctx.beginPath();
  ctx.arc(cx, hY, 8, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();

  // ── Tip (top) ──
  const tipR = inContact ? 3.5 : 3;
  ctx.save();
  ctx.fillStyle = inContact && contactMat ? MATS[contactMat].col : 'rgba(255,255,255,0.8)';
  ctx.shadowColor = ctx.fillStyle;
  ctx.shadowBlur = inContact ? 8 : 0;
  ctx.beginPath();
  ctx.arc(tX, tY, tipR, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();

  // ── Ripple rings when hitting ──
  if (inContact && contactMat && Math.abs(tipOff) > 3) {
    const m = MATS[contactMat];
    const intensity = Math.min(Math.abs(tipOff) / m.maxD, 1);
    const phase = (t * 0.0025) % 1;
    for (let i = 0; i < 3; i++) {
      const p = (phase + i / 3) % 1;
      const r = 5 + p * 36;
      ctx.save();
      ctx.globalAlpha = (1 - p) * 0.55 * intensity;
      ctx.strokeStyle = m.col;
      ctx.lineWidth = 1.2;
      ctx.beginPath();
      ctx.arc(tX, tY, r, 0, Math.PI * 2);
      ctx.stroke();
      ctx.restore();
    }
  }
}

// ══════════════════════════════════════════════
//  MAIN LOOP
// ══════════════════════════════════════════════
let prev = 0;
function loop(t) {
  const dt = Math.min((t - prev) / 1000, 0.05);
  prev = t;
  requestAnimationFrame(loop);

  applyKeyboard(dt);
  if (started) {
    physicsStep(dt);
    document.getElementById('hud-pos').textContent = vx.toFixed(1) + ' cm';
  }

  drawBackground();
  drawObjectHints();
  drawRadar();
  drawCane(t);
}
requestAnimationFrame(loop);
</script>
</body>
</html>
