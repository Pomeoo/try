<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>仮想杖</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body {
  width:100%; height:100%; overflow:hidden;
  background:#fff;
  -webkit-user-select:none; user-select:none;
  touch-action:none;
}
canvas { display:block; }

#statusBar {
  position:fixed; top:0; left:0; right:0;
  padding:14px 20px;
  display:flex; align-items:center; gap:8px;
  pointer-events:none;
}
#dot {
  width:7px; height:7px; border-radius:50%;
  background:rgba(0,0,0,0.12);
  flex-shrink:0;
  transition: background 0.3s;
}
#statusText {
  font-family:-apple-system, sans-serif;
  font-size:11px; letter-spacing:0.07em;
  color:rgba(0,0,0,0.28);
  transition: color 0.3s;
}

#startBtn {
  position:fixed; bottom:52px; left:50%;
  transform:translateX(-50%);
  padding:15px 52px;
  border:1px solid rgba(0,0,0,0.14);
  border-radius:100px;
  background:rgba(0,0,0,0.03);
  color:rgba(0,0,0,0.55);
  font-family:-apple-system, sans-serif;
  font-size:15px; letter-spacing:0.06em;
  cursor:pointer;
}
#startBtn:active { opacity:0.5; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="statusBar">
  <span id="dot"></span>
  <span id="statusText">待機中</span>
</div>
<button id="startBtn" onclick="startSensor()">計測開始</button>

<script>
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
let W, H;

function resize() {
  const dpr = window.devicePixelRatio || 1;
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width  = W * dpr;
  canvas.height = H * dpr;
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
resize();
window.addEventListener('resize', resize);

// ── センサー物理 ──────────────────────────────────────
let posX      = 0;      // 右方向移動距離 (m)
let velX      = 0;
let lastT     = null;
let running   = false;
const STILL   = 0.09;   // 静止閾値 m/s²
const VEL_DAMP = 0.80;

const CATCH_X = 0.030;  // 3cm : 引っかかり
const WALL_X  = 0.060;  // 6cm : ざらざら壁

// ── 杖アニメーション ──────────────────────────────────
// caneAngle: 垂直からの傾き (ラジアン)
// + = 右傾き, - = 左傾き
let caneAngle  = 0;

// 状態
let catchFired = false;
let catchT     = 0;     // 引っかかり発生時刻 (ms)
let wallMode   = false;

// ── 杖の描画 ─────────────────────────────────────────
// 画面中央を通り、angle だけ傾いた全高ライン
function drawCane(angle) {
  const cx   = W / 2;
  const half = H / 2;
  const sa   = Math.sin(angle);
  const ca   = Math.cos(angle);
  // 中心を軸に回転した上端・下端
  const x1 = cx - sa * half,  y1 = half - ca * half;
  const x2 = cx + sa * half,  y2 = half + ca * half;

  ctx.save();
  ctx.strokeStyle = '#b0b0b0';
  ctx.lineWidth   = 2;
  ctx.lineCap     = 'butt';
  ctx.beginPath();
  ctx.moveTo(x1, y1);
  ctx.lineTo(x2, y2);
  ctx.stroke();
  ctx.restore();
}

// ── 描画ループ ────────────────────────────────────────
function draw(now) {
  requestAnimationFrame(draw);

  // 背景（真っ白）
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, 0, W, H);

  // 杖の現在角度を状態に応じて算出
  if (wallMode) {
    // ざらざら: 左右高速往復（±約20°, 約10Hz）
    // 2つの周波数を重ねてカツカツ感を出す
    const t = now * 0.001;
    caneAngle = Math.sin(t * 63.0) * 0.34
              + Math.sin(t * 97.0) * 0.07;

  } else if (catchFired) {
    // 引っかかり: 傾いてから戻る減衰振動
    const elapsed = (now - catchT) * 0.001;
    // 最大 ~22°(0.38rad) から減衰
    caneAngle = 0.38 * Math.exp(-elapsed * 4.5)
                     * Math.cos(elapsed * 20.0);

  } else {
    // 自由: 垂直に戻る
    caneAngle *= 0.88;
  }

  drawCane(caneAngle);
}
requestAnimationFrame(draw);

// ── センサー処理 ──────────────────────────────────────
function handleMotion(e) {
  if (!running) return;
  const now = performance.now();
  if (!lastT) { lastT = now; return; }
  const dt = Math.min((now - lastT) * 0.001, 0.05);
  lastT = now;

  const acc = e.accelerationIncludingGravity || e.acceleration;
  if (!acc) return;

  // iPhone portrait 右方向 = acc.x 正
  const raw      = acc.x || 0;
  const filtered = raw > STILL ? raw : 0;

  velX = (velX + filtered * dt) * (filtered === 0 ? VEL_DAMP : 0.99);
  if (velX < 0.002) velX = 0;

  // 右方向のみ加算。壁モードでは 6cm + α でキャップ
  const delta = Math.max(0, velX * dt);
  posX = wallMode
    ? Math.min(posX + delta, WALL_X + 0.005)
    : posX + delta;

  // 状態遷移
  if (!catchFired && posX >= CATCH_X) {
    catchFired = true;
    catchT     = performance.now();
  }
  if (!wallMode && posX >= WALL_X) {
    wallMode = true;
  }

  updateStatus();
}

// ── ステータス表示 ────────────────────────────────────
function updateStatus() {
  const dot = document.getElementById('dot');
  const txt = document.getElementById('statusText');
  const cm  = (posX * 100).toFixed(1);

  if (wallMode) {
    dot.style.background  = 'rgba(220,100,50,0.9)';
    txt.style.color        = 'rgba(200,80,30,0.8)';
    txt.textContent        = `ざらざら接触中 · ${cm} cm`;
  } else if (catchFired) {
    dot.style.background  = 'rgba(60,120,220,0.9)';
    txt.style.color        = 'rgba(50,100,200,0.8)';
    txt.textContent        = `引っかかり · ${cm} cm`;
  } else {
    dot.style.background  = 'rgba(40,180,100,0.85)';
    txt.style.color        = 'rgba(0,0,0,0.28)';
    txt.textContent        = `正常動作中 · ${cm} cm`;
  }
}

// ── 開始 / リセット ────────────────────────────────────
async function startSensor() {
  const btn = document.getElementById('startBtn');

  if (typeof DeviceMotionEvent !== 'undefined'
      && typeof DeviceMotionEvent.requestPermission === 'function') {
    try {
      const p = await DeviceMotionEvent.requestPermission();
      if (p !== 'granted') {
        document.getElementById('statusText').textContent = 'センサー許可が必要です';
        return;
      }
    } catch(err) {
      document.getElementById('statusText').textContent = '起動エラー';
      return;
    }
  }

  window.addEventListener('devicemotion', handleMotion, { passive: true });
  running = true;

  btn.textContent = 'リセット';
  btn.onclick     = doReset;

  const dot = document.getElementById('dot');
  dot.style.background = 'rgba(40,180,100,0.85)';
  document.getElementById('statusText').textContent = '正常動作中 · 0.0 cm';
}

function doReset() {
  posX = 0; velX = 0;
  caneAngle = 0;
  catchFired = false;
  wallMode   = false;
  lastT      = null;

  document.getElementById('dot').style.background   = 'rgba(40,180,100,0.85)';
  document.getElementById('statusText').style.color = 'rgba(0,0,0,0.28)';
  document.getElementById('statusText').textContent  = '正常動作中 · 0.0 cm';
}
</script>
</body>
</html>
