<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iPhone水平移動検知 WebAR</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: sans-serif;
            color: white;
            text-align: center;
        }
        #ar-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: center;
            pointer-events: none; /* ARコンテンツとの干渉を防ぐ */
            z-index: 100;
        }
        #distance-display {
            background-color: rgba(0, 0, 0, 0.7);
            padding: 15px 25px;
            border-radius: 10px;
            font-size: 2em;
            margin-bottom: 50px;
        }
        #start-ar-button {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            padding: 15px 30px;
            font-size: 1.2em;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            z-index: 101;
        }
        #start-ar-button:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>
    <button id="start-ar-button">ARを開始</button>
    <div id="ar-overlay">
        <div id="distance-display">移動距離: 0.00 m</div>
    </div>

    <script type="module">
        import * as THREE from 'https://unpkg.com/three@0.128.0/build/three.module.js';
        import { ARButton } from 'https://unpkg.com/three@0.128.0/examples/jsm/webxr/ARButton.js';

        let camera, scene, renderer;
        let controller;
        let lastCameraPosition = new THREE.Vector3( );
        let totalHorizontalDistance = 0;
        let distanceDisplay;

        init();
        animate();

        function init() {
            scene = new THREE.Scene();

            camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 20);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.xr.enabled = true;
            document.body.appendChild(renderer.domElement);

            document.body.appendChild(ARButton.createButton(renderer, { requiredFeatures: ['hit-test', 'dom-overlay'], domOverlay: { root: document.body } }));

            distanceDisplay = document.getElementById('distance-display');

            // ARセッション開始時に初期位置をリセット
            renderer.xr.addEventListener('sessionstart', function () {
                console.log('AR Session Started');
                lastCameraPosition.set(0, 0, 0);
                totalHorizontalDistance = 0;
                distanceDisplay.textContent = '移動距離: 0.00 m';
            });

            window.addEventListener('resize', onWindowResize, false);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            renderer.setAnimationLoop(render);
        }

        function render() {
            if (renderer.xr.isPresenting) {
                const session = renderer.xr.getSession();
                if (session) {
                    const frame = renderer.xr.getFrame();
                    if (frame) {
                        const viewerPose = frame.getViewerPose(session.referenceSpace);
                        if (viewerPose) {
                            const currentCameraPosition = viewerPose.transform.position;

                            // 初回またはセッション開始時
                            if (lastCameraPosition.x === 0 && lastCameraPosition.y === 0 && lastCameraPosition.z === 0) {
                                lastCameraPosition.copy(currentCameraPosition);
                            } else {
                                // 水平方向の移動距離を計算 (Y軸は無視)
                                const dx = currentCameraPosition.x - lastCameraPosition.x;
                                const dz = currentCameraPosition.z - lastCameraPosition.z;
                                const horizontalDistance = Math.sqrt(dx * dx + dz * dz);

                                totalHorizontalDistance += horizontalDistance;
                                distanceDisplay.textContent = `移動距離: ${totalHorizontalDistance.toFixed(2)} m`;

                                lastCameraPosition.copy(currentCameraPosition);
                            }
                        }
                    }
                }
            }
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
