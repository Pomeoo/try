<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>表現工夫版 — Hard / Soft</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; touch-action:none; user-select:none; -webkit-user-select:none; }
body { background:#0c0c0c; height:100dvh; overflow:hidden; font-family:-apple-system,'Helvetica Neue',sans-serif; }
canvas { display:block; }
#hud {
  position:fixed; top:0; left:0; right:0;
  display:flex; justify-content:space-between; align-items:center;
  padding:20px 22px 0; pointer-events:none; z-index:5;
}
.hl { font-size:9px; letter-spacing:4px; text-transform:uppercase; color:rgba(255,255,255,0.18); }
.hc { font-size:8px; letter-spacing:2px; color:rgba(255,255,255,0.09); }
#over {
  position:fixed; inset:0; background:#0c0c0c;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  gap:28px; z-index:100;
}
.ot { font-size:10px; letter-spacing:8px; color:rgba(255,255,255,0.45); text-transform:uppercase; }
.od { font-size:11px; color:rgba(255,255,255,0.25); text-align:center; line-height:2.5; }
.obs { font-family:inherit; font-size:10px; letter-spacing:5px; text-transform:uppercase;
       background:transparent; color:rgba(255,255,255,0.35);
       border:1px solid rgba(255,255,255,0.15); padding:14px 40px; cursor:pointer; }
</style>
</head>
<body>

<div id="hud">
  <span class="hl">← Hard</span>
  <span class="hc">表現工夫版 · X軸</span>
  <span class="hl">Soft →</span>
</div>
<canvas id="c"></canvas>

<div id="over">
  <div class="ot">表現工夫版</div>
  <div class="od">スマホを左右に傾けてください<br>← 左に傾ける = 硬い壁（約1秒表示）<br>→ 右に傾ける = 柔らかい壁（くぼむ）</div>
  <button class="obs" id="sb">Start</button>
</div>

<script>
'use strict';
const C = document.getElementById('c');
const X = C.getContext('2d');
function resize(){ C.width = innerWidth; C.height = innerHeight; }
resize(); addEventListener('resize', resize);

let tx = 0, hasG = false, playing = false;

const HWX = () => C.width * 0.155;
const SWX = () => C.width * 0.845;
const N   = 200;
const sDx = new Float32Array(N);
const MAX_INDENT = 52;

const HOLD_DUR = 0.85;
const FADE_DUR = 0.35;
const H_THRESH = 0.13;
const S_THRESH = 0.13;

let hTimer = -1, hOpacity = 0, hWasActive = false;

let lt = 0;
function loop(ts){
  if (!playing) return;
  const dt = Math.min((ts - lt) / 1000, 0.05);
  lt = ts;

  const hActive = tx < -H_THRESH;
  const sActive = tx > S_THRESH;

  // Hard wall: hold then fade
  if (hActive && !hWasActive) hTimer = 0;
  hWasActive = hActive;
  if (hTimer >= 0) {
    hTimer += dt;
    hOpacity = hTimer < HOLD_DUR
      ? 1.0
      : Math.max(0, 1 - (hTimer - HOLD_DUR) / FADE_DUR);
    if (hOpacity <= 0) hTimer = -1;
  }

  // Soft wall: cosine indent, fast in / slow return
  const sOp = sActive ? Math.max(0, tx - S_THRESH) / (1 - S_THRESH) : 0;
  const sh  = C.height / N;
  for (let i = 0; i < N; i++) {
    const tgt = MAX_INDENT * sOp * Math.sin(Math.PI * (i / (N - 1)));
    const spd = tgt > sDx[i] ? 14 : 3.5;
    sDx[i] += (tgt - sDx[i]) * spd * dt;
    if (sDx[i] < 0) sDx[i] = 0;
  }

  draw(sOp);
  requestAnimationFrame(loop);
}

function draw(sOp){
  const W = C.width, H = C.height;
  const hw = HWX(), sw = SWX(), sh = C.height / N;

  X.fillStyle = '#0c0c0c';
  X.fillRect(0, 0, W, H);

  // Center reference line
  X.save();
  X.strokeStyle = 'rgba(255,255,255,0.035)';
  X.lineWidth = 1; X.setLineDash([3,12]);
  X.beginPath(); X.moveTo(W/2, 0); X.lineTo(W/2, H); X.stroke();
  X.setLineDash([]); X.restore();

  // ── HARD WALL ─────────────────────────────────────────
  if (hOpacity > 0.004) {
    X.save();
    X.globalAlpha = hOpacity;

    X.fillStyle = '#f0f0f0';
    X.fillRect(0, 0, hw, H);

    const glow = X.createRadialGradient(hw, H/2, 0, hw, H/2, W * 0.55);
    glow.addColorStop(0,   'rgba(255,255,255,0.28)');
    glow.addColorStop(0.4, 'rgba(255,255,255,0.06)');
    glow.addColorStop(1,   'rgba(255,255,255,0)');
    X.fillStyle = glow;
    X.fillRect(0, 0, hw + W * 0.55, H);

    X.beginPath();
    X.arc(hw, H/2, hOpacity * W * 0.18, -Math.PI/1.9, Math.PI/1.9);
    X.strokeStyle = `rgba(255,255,255,${hOpacity * 0.88})`;
    X.lineWidth = 2; X.stroke();

    X.globalAlpha = 1;
    X.restore();
  }

  // ── SOFT WALL — concave indent ─────────────────────────
  if (sOp > 0.01 || sDx.some(v => v > 0.3)) {
    let maxD = 0;
    for (let i = 0; i < N; i++) if (sDx[i] > maxD) maxD = sDx[i];

    // Wall surface recedes rightward (into wall material)
    X.beginPath();
    X.moveTo(W, 0);
    for (let i = 0; i <= N; i++) X.lineTo(sw + sDx[Math.min(i, N-1)], i * sh);
    X.lineTo(W, H);
    X.closePath();
    X.fillStyle = '#7e7e7e';
    X.fill();

    // Pit interior shadow
    if (maxD > 2) {
      for (let i = 0; i < N; i++) {
        if (sDx[i] < 0.4) continue;
        const y   = i * sh;
        const dep = Math.min(0.68, sDx[i] / 52);
        const sg  = X.createLinearGradient(sw, 0, sw + sDx[i], 0);
        sg.addColorStop(0,   'rgba(0,0,0,0)');
        sg.addColorStop(0.5, `rgba(0,0,0,${dep * 0.55})`);
        sg.addColorStop(1,   `rgba(0,0,0,${dep})`);
        X.fillStyle = sg;
        X.fillRect(sw, y, sDx[i] + 1, sh + 0.5);
      }
    }

    // Rim highlight at pit mouth
    if (maxD > 3) {
      const rimG = X.createLinearGradient(sw - 6, 0, sw + 3, 0);
      rimG.addColorStop(0,   'rgba(255,255,255,0)');
      rimG.addColorStop(0.7, `rgba(255,255,255,${Math.min(0.45, sOp * 0.38)})`);
      rimG.addColorStop(1,   'rgba(255,255,255,0)');
      X.fillStyle = rimG;
      X.fillRect(sw - 6, 0, 10, H);
    }

    // Recessed surface highlight
    X.beginPath();
    for (let i = 0; i <= N; i++) {
      const x = sw + sDx[Math.min(i, N-1)], y = i * sh;
      if (i === 0) X.moveTo(x, y); else X.lineTo(x, y);
    }
    X.strokeStyle = `rgba(255,255,255,${0.18 + sOp * 0.15})`;
    X.lineWidth = 1.5; X.stroke();
  }
}

// Keyboard fallback
const K = {};
addEventListener('keydown', e => { K[e.key] = true; });
addEventListener('keyup',   e => { K[e.key] = false; });
setInterval(() => {
  if (hasG) return;
  const s = 0.08;
  if      (K['ArrowLeft']  || K['a']) tx = Math.max(-1, tx - s);
  else if (K['ArrowRight'] || K['d']) tx = Math.min(1,  tx + s);
  else tx *= 0.80;
}, 16);

// Gyro: gamma = left/right tilt
addEventListener('deviceorientation', e => {
  hasG = true;
  tx = Math.max(-1, Math.min(1, (e.gamma || 0) / 30));
}, true);

document.getElementById('sb').addEventListener('click', async () => {
  if (typeof DeviceOrientationEvent !== 'undefined' &&
      typeof DeviceOrientationEvent.requestPermission === 'function') {
    try { const r = await DeviceOrientationEvent.requestPermission(); if (r === 'granted') hasG = true; } catch{}
  }
  document.getElementById('over').style.display = 'none';
  sDx.fill(0);
  hTimer = -1; hOpacity = 0; hWasActive = false;
  playing = true; lt = performance.now();
  requestAnimationFrame(loop);
});
</script>
</body>
</html>
